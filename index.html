<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Art Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">{</span>
        <span class="logo-text">CSS ART</span>
        <span class="logo-bracket">}</span>
        <span class="logo-sub">GALLERY</span>
      </div>
      <div class="header-controls">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" class="search-input" placeholder="Search artworks…" autocomplete="off" />
          <button class="search-clear" id="searchClear" aria-label="Clear search">×</button>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon-sun">☀</span>
          <span class="theme-icon-moon">◗</span>
        </button>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Nature">Nature</button>
      <button class="filter-btn" data-filter="Characters">Characters</button>
      <button class="filter-btn" data-filter="Abstract">Abstract</button>
      <button class="filter-btn" data-filter="Pixel Art">Pixel Art</button>
      <button class="filter-btn" data-filter="favorites">❤ Favorites</button>
    </div>
  </header>

  <!-- ===== STATS BAR ===== -->
  <div class="stats-bar">
    <span id="statsText">Loading gallery…</span>
  </div>

  <!-- ===== GALLERY GRID ===== -->
  <main class="gallery-grid" id="galleryGrid">
    <!-- Cards injected by JS -->
  </main>

  <!-- ===== EMPTY STATE ===== -->
  <div class="empty-state" id="emptyState" hidden>
    <div class="empty-icon">∅</div>
    <p>No artworks match your search.</p>
    <button class="btn-reset" onclick="ArtGallery.resetFilters()">Reset filters</button>
  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-box">

      <button class="modal-close" id="modalClose" aria-label="Close">×</button>

      <div class="modal-layout">

        <!-- Left: artwork preview -->
        <div class="modal-preview-col">
          <div class="modal-artwork-stage" id="modalArtworkStage">
            <!-- artwork HTML injected here -->
          </div>
          <div class="modal-interactive-hint" id="modalInteractiveHint"></div>
        </div>

        <!-- Right: info -->
        <div class="modal-info-col">
          <div class="modal-badges">
            <span class="badge category-badge" id="modalCategory"></span>
            <span class="badge difficulty-badge" id="modalDifficulty"></span>
          </div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <p class="modal-desc" id="modalDesc"></p>

          <div class="modal-techniques" id="modalTechniques">
            <span class="techniques-label">CSS Techniques</span>
            <div class="technique-tags" id="modalTechniqueTags"></div>
          </div>

          <div class="modal-actions">
            <button class="btn-fav" id="modalFavBtn">♡ Add to Favorites</button>
            <button class="btn-source" id="modalSourceBtn">⟨/⟩ View Source</button>
          </div>

          <!-- Challenge section -->
          <div class="challenge-box" id="challengeBox" hidden>
            <h4>✨ CSS Challenge</h4>
            <p id="challengeText"></p>
          </div>

          <!-- Source Code Panel -->
          <div class="source-panel" id="sourcePanel" hidden>
            <div class="source-tabs">
              <button class="source-tab active" data-tab="html">HTML</button>
              <button class="source-tab" data-tab="css">CSS</button>
            </div>
            <pre class="source-code" id="sourceCode"></pre>
          </div>

        </div>
      </div>

      <!-- Tweak Mode (for interactive artwork) -->
      <div class="tweak-panel" id="tweakPanel" hidden>
        <h4>🎨 Tweak This Art</h4>
        <div class="tweak-controls" id="tweakControls"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
